version: '3.8'

services:
  bookreminder:
    build: .
    container_name: bookreminder
    restart: unless-stopped
    ports:
      - "5000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_URL=https://books.mafede.i234.me
      - JWT_SECRET=cambiar_por_un_secreto_seguro_y_largo
      - DB_PATH=/app/data/library.db
      - CENTRAL_EMAIL_URL=https://cartero.mafede.i234.me
      - CENTRAL_EMAIL_KEY=mikiaiapp
      - GEMINI_API_KEY= # Se carga desde /app/data/gemini_key.txt si está disponible
    volumes:
      - /volume1/docker/bookreminder/data:/app/data
