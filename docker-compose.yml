version: '3.8'

services:
  bookreminder:
    build: .
    container_name: bookreminder
    restart: unless-stopped
    ports:
      - "5000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_URL=https://books.mafede.i234.me
      - JWT_SECRET=cambiar_por_un_secreto_seguro_y_largo
      - DB_PATH=/app/data/library.db
      - GEMINI_API_KEY=
    volumes:
      - /volume1/docker/bookreminder/data:/app/data
